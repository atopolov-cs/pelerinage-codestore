<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Grand Pèlerinage Commercial — code.store</title>
<style>
  :root {
    --pink: #FF0F6C;
    --pink-dark: #CC0A56;
    --pink-light: #FFE5EF;
    --black: #15141A;
    --grey: #6B6B80;
    --light-grey: #F4F4F6;
    --mid-grey: #E4E4E9;
    --white: #FFFFFF;
    --shadow: 0 1px 3px rgba(20,20,30,0.06), 0 1px 2px rgba(20,20,30,0.04);
    --shadow-md: 0 4px 14px rgba(20,20,30,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--light-grey);
    color: var(--black);
    padding-bottom: 48px;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== CONFIG SCREEN ===== */
  #config-screen {
    max-width: 440px;
    margin: 64px auto;
    background: var(--white);
    border-radius: 18px;
    padding: 28px 26px;
    box-shadow: var(--shadow-md);
  }
  .config-logo-wrap {
    display: flex; justify-content: center; margin-bottom: 22px;
  }
  .config-logo-wrap img {
    height: 42px; border-radius: 10px;
  }
  #config-screen h2 { font-size: 19px; font-weight: 700; margin-bottom: 6px; text-align: center; }
  #config-screen p { color: var(--grey); font-size: 13px; margin-bottom: 18px; text-align: center; }
  #config-screen label { display: block; font-size: 11.5px; font-weight: 600; color: var(--grey); margin-top: 14px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.02em; }
  #config-screen input, #config-screen select {
    width: 100%; padding: 11px 12px; border: 1.5px solid var(--mid-grey); border-radius: 10px;
    font-size: 14px; font-family: inherit; transition: border-color 0.15s; background: var(--light-grey);
  }
  #config-screen input:focus, #config-screen select:focus {
    outline: none; border-color: var(--pink); background: var(--white);
  }
  #config-screen button {
    width: 100%; margin-top: 22px; padding: 13px; background: var(--pink); color: white;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s; box-shadow: var(--shadow);
  }
  #config-screen button:active { opacity: 0.85; }
  #config-error { color: #C0392B; font-size: 12px; margin-top: 10px; display: none; line-height: 1.4; }

  /* ===== APP SHELL ===== */
  #app { display: none; max-width: 600px; margin: 0 auto; padding: 14px; }

  .app-logo-bar {
    display: flex; justify-content: center; padding: 6px 0 16px;
  }
  .app-logo-bar img { height: 30px; border-radius: 7px; box-shadow: var(--shadow); }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-dark) 100%);
    border-radius: 16px;
    padding: 18px 20px;
    color: white;
    margin-bottom: 14px;
    box-shadow: var(--shadow-md);
  }
  .header-top { display: flex; align-items: center; gap: 11px; margin-bottom: 12px; }
  .header-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px;
    flex-shrink: 0;
  }
  .header-title { font-size: 15.5px; font-weight: 700; line-height: 1.25; }
  .header-sub { font-size: 11.5px; color: #FFCFE3; margin-top: 1px; }
  .progress-bar { height: 7px; background: rgba(255,255,255,0.25); border-radius: 4px; overflow: hidden; margin: 12px 0 10px; }
  .progress-fill { height: 100%; background: white; border-radius: 4px; transition: width 0.5s ease; }
  .header-stats { display: flex; justify-content: space-between; align-items: baseline; }
  .header-stats-left { font-size: 12.5px; color: #FFCFE3; font-weight: 500; }
  .header-score { font-size: 32px; font-weight: 800; line-height: 1; text-align: right; letter-spacing: -0.01em; }
  .header-score-label { font-size: 10.5px; color: #FFCFE3; text-align: right; text-transform: uppercase; letter-spacing: 0.03em; }

  /* ===== SELECTOR BAR ===== */
  .selector-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .selector-bar select {
    flex: 1; padding: 9px 11px; border-radius: 10px; border: 1.5px solid var(--mid-grey);
    background: var(--white); font-size: 13px; font-family: inherit; color: var(--black);
    box-shadow: var(--shadow); min-width: 0;
  }

  /* ===== BADGES ===== */
  #badges-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px; background: #FFF7E6; border: 1px solid #E8A93B;
    color: #8A5A0E; border-radius: 20px; padding: 6px 12px; font-size: 11.5px; font-weight: 600;
    animation: pop 0.4s cubic-bezier(.34,1.56,.64,1); box-shadow: var(--shadow);
  }
  @keyframes pop { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  /* ===== EXPORT BUTTON ===== */
  .export-btn {
    width: 100%; padding: 12px; background: var(--white); color: var(--pink); border: 1.5px solid var(--pink);
    border-radius: 12px; font-size: 13.5px; font-weight: 700; cursor: pointer; margin-bottom: 16px;
    transition: background 0.15s; box-shadow: var(--shadow);
  }
  .export-btn:active { background: var(--pink-light); }

  /* ===== ACCOUNT CARDS ===== */
  .account-card {
    background: var(--white); border: 1px solid var(--mid-grey); border-left: 4px solid var(--mid-grey);
    border-radius: 14px; padding: 16px; margin-bottom: 11px; box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }
  .account-card.done { border-left-color: #16A34A; }
  .account-card.absent { border-left-color: #DC2626; }
  .account-card.contact { border-left-color: #D97706; }
  .account-card.rdv { border-left-color: #2563EB; }

  .card-top { display: flex; gap: 11px; }
  .num-badge {
    width: 28px; height: 28px; border-radius: 50%; background: var(--pink); color: white;
    font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; box-shadow: 0 2px 5px rgba(255,15,108,0.35);
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 14.5px; font-weight: 700; margin-bottom: 2px; line-height: 1.3; }
  .card-addr { font-size: 11.5px; color: var(--grey); margin-bottom: 7px; }
  .card-pills { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 10.5px; font-weight: 700; }
  .pill-icp1 { background: var(--pink-light); color: var(--pink-dark); }
  .pill-icp2 { background: #EEEEF2; color: var(--grey); }
  .pill-type { color: var(--grey); font-size: 11px; }

  .itin-toggle {
    font-size: 11.5px; color: var(--pink); background: none; border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px; margin-top: 9px; padding: 0; font-weight: 600;
  }
  .itin-box {
    display: none; background: var(--light-grey); border-radius: 10px; padding: 10px 12px;
    font-size: 11.5px; color: var(--grey); margin-top: 7px; line-height: 1.45;
  }
  .maps-link {
    display: inline-flex; align-items: center; gap: 4px; color: var(--pink); font-size: 11.5px;
    font-weight: 700; text-decoration: none; margin-top: 7px;
  }

  .visite-row { margin-top: 12px; display: flex; align-items: center; gap: 9px; }
  .visite-checkbox {
    width: 23px; height: 23px; border: 2px solid var(--mid-grey); border-radius: 7px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s;
    color: white; font-size: 13px;
  }
  .visite-checkbox.checked { background: #16A34A; border-color: #16A34A; }
  .visite-label { font-size: 12.5px; font-weight: 600; cursor: pointer; }

  .result-options { display: none; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .result-btn {
    border: 1.5px solid var(--mid-grey); border-radius: 9px; padding: 7px 10px; font-size: 11px;
    cursor: pointer; background: var(--white); color: var(--grey); font-weight: 600; transition: all 0.15s;
  }
  .result-btn.active-absent { background: #FEE2E2; border-color: #DC2626; color: #991B1B; }
  .result-btn.active-courrier { background: #E0E7FF; border-color: #4F46E5; color: #3730A3; }
  .result-btn.active-contact { background: #FEF3C7; border-color: #D97706; color: #854D0E; }
  .result-btn.active-rdv { background: #DBEAFE; border-color: #2563EB; color: #1D4ED8; }

  .note-input {
    width: 100%; margin-top: 9px; border: 1.5px solid var(--mid-grey); border-radius: 9px;
    padding: 8px 10px; font-size: 12px; font-family: inherit; resize: none; background: var(--light-grey);
    transition: border-color 0.15s;
  }
  .note-input:focus { outline: none; border-color: var(--pink); background: var(--white); }

  .saving-indicator {
    font-size: 10.5px; color: #16A34A; font-weight: 600; margin-top: 7px; opacity: 0; transition: opacity 0.3s;
  }
  .saving-indicator.show { opacity: 1; }

  .loading-msg { text-align: center; padding: 64px 20px; color: var(--grey); font-size: 13.5px; }

  .footer-summary {
    text-align: center; font-size: 12px; color: var(--grey); margin-top: 20px; padding: 15px;
    background: var(--white); border-radius: 12px; box-shadow: var(--shadow);
  }
</style>
</head>

<script>
const STORAGE_KEY = "pelerinage_config";

const RESULT_OPTIONS = [
  { key: "Absent", label: "Absent", pts: 2, cls: "active-absent", cardCls: "absent" },
  { key: "Courrier remis", label: "Courrier remis", pts: 10, cls: "active-courrier", cardCls: "done" },
  { key: "Contact obtenu", label: "Contact obtenu", pts: 25, cls: "active-contact", cardCls: "contact" },
  { key: "RDV décroché", label: "RDV décroché", pts: 50, cls: "active-rdv", cardCls: "rdv" },
];

const BADGES = [
  { id: "first", label: "🚶 En route pour la gloire", cond: s => s.done >= 1 },
  { id: "half", label: "🏃 La moitié du chemin, c'est déjà fait", cond: s => s.total > 0 && s.done >= Math.ceil(s.total / 2) },
  { id: "full", label: "🏆 Le Grand Pèlerinage accompli", cond: s => s.total > 0 && s.done >= s.total },
  { id: "rdv1", label: "✨ Le Saint-Graal", cond: s => s.rdvs >= 1 },
  { id: "contact2", label: "🗣️ Langue d'or", cond: s => s.contacts >= 2 },
  { id: "courrier3", label: "📬 Le facteur sonne toujours", cond: s => s.courriers >= 3 },
];

let CONFIG = {};
let RECORDS = [];
let shownBadges = new Set();

function loadStoredConfig() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const cfg = JSON.parse(raw);
      document.getElementById("cfg-token").value = cfg.token || "";
      document.getElementById("cfg-base").value = cfg.base || "appL1KIsFNhdVx89F";
      document.getElementById("cfg-table").value = cfg.table || "Imported table";
      document.getElementById("cfg-bdr").value = cfg.bdr || "Daphné Vogelgesang";
      document.getElementById("cfg-day").value = cfg.day || "Mardi";
      return cfg;
    } catch(e) {}
  }
  return null;
}

async function saveConfigAndLoad() {
  const token = document.getElementById("cfg-token").value.trim();
  const base = document.getElementById("cfg-base").value.trim();
  const table = document.getElementById("cfg-table").value.trim();
  const bdr = document.getElementById("cfg-bdr").value;
  const day = document.getElementById("cfg-day").value;
  const errEl = document.getElementById("config-error");
  errEl.style.display = "none";

  if (!token || !base || !table) {
    errEl.textContent = "Merci de remplir tous les champs.";
    errEl.style.display = "block";
    return;
  }

  CONFIG = { token, base, table, bdr, day };

  try {
    await fetchRecords();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(CONFIG));
    document.getElementById("config-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("nav-bdr").value = bdr;
    document.getElementById("nav-day").value = day;
    shownBadges = new Set();
    renderAll();
  } catch (e) {
    errEl.textContent = "Erreur de connexion : " + e.message + " — vérifie ton token et le nom de la table.";
    errEl.style.display = "block";
  }
}

async function switchTour() {
  const newBdr = document.getElementById("nav-bdr").value;
  const newDay = document.getElementById("nav-day").value;
  CONFIG.bdr = newBdr;
  CONFIG.day = newDay;

  const container = document.getElementById("accounts-container");
  container.innerHTML = '<div class="loading-msg">Chargement de la tournée…</div>';
  shownBadges = new Set();
  document.getElementById("badges-row").innerHTML = "";

  try {
    await fetchRecords();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(CONFIG));
    renderAll();
  } catch (e) {
    container.innerHTML = `<div class="loading-msg">Erreur de chargement : ${e.message}</div>`;
  }
}

function getNumField(fields) {
  // Le caractère "#" peut être encodé différemment selon la source (ASCII vs Unicode).
  // On cherche dynamiquement la clé qui correspond, plutôt que de supposer "#" exact.
  const keys = Object.keys(fields);
  let numKey = keys.find(k => k === "#");
  if (!numKey) {
    numKey = keys.find(k => k.length <= 2 && /[#＃№]/.test(k));
  }
  return numKey ? Number(fields[numKey]) : null;
}

async function fetchRecords() {
  const url = `https://api.airtable.com/v0/${CONFIG.base}/${encodeURIComponent(CONFIG.table)}?pageSize=100`;
  const res = await fetch(url, {
    headers: { Authorization: `Bearer ${CONFIG.token}` }
  });
  if (!res.ok) {
    const errBody = await res.json().catch(() => ({}));
    throw new Error(errBody.error?.message || res.statusText);
  }
  const data = await res.json();
  RECORDS = data.records.filter(r => {
    const f = r.fields;
    return f.BDR === CONFIG.bdr && (f["Journée"] || "").includes(CONFIG.day);
  }).sort((a, b) => (getNumField(a.fields) || 0) - (getNumField(b.fields) || 0));
  console.log("Ordre chargé:", RECORDS.map(r => getNumField(r.fields) + " - " + r.fields["Entreprise"]));
}

async function updateRecord(recordId, fields) {
  const url = `https://api.airtable.com/v0/${CONFIG.base}/${encodeURIComponent(CONFIG.table)}/${recordId}`;
  const res = await fetch(url, {
    method: "PATCH",
    headers: {
      Authorization: `Bearer ${CONFIG.token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ fields })
  });
  if (!res.ok) {
    const errBody = await res.json().catch(() => ({}));
    throw new Error(errBody.error?.message || res.statusText);
  }
  return res.json();
}

function getStats() {
  let score = 0, done = 0, rdvs = 0, contacts = 0, courriers = 0;
  RECORDS.forEach(r => {
    const f = r.fields;
    if (f["Statut visite"]) {
      done++;
      const result = f["Résultat"];
      const opt = RESULT_OPTIONS.find(o => o.key === result);
      if (opt) {
        let pts = opt.pts;
        if (f["ICP"] === "ICP 1" && result !== "Absent") pts = Math.round(pts * 1.3);
        score += pts;
        if (result === "RDV décroché") rdvs++;
        if (result === "Contact obtenu") contacts++;
        if (result === "Courrier remis") courriers++;
      }
    }
  });
  return { score, done, total: RECORDS.length, rdvs, contacts, courriers };
}

function updateHeader() {
  const s = getStats();
  document.getElementById("score-display").textContent = s.score;
  document.getElementById("done-count").textContent = s.done;
  document.getElementById("total-count").textContent = s.total;
  document.getElementById("prog-fill").style.width = s.total > 0 ? Math.round(s.done / s.total * 100) + "%" : "0%";
  document.getElementById("footer-summary").textContent =
    `${s.done}/${s.total} visites · ${s.rdvs} RDV décroché(s) · ${s.contacts} contact(s) · ${s.courriers} courrier(s)`;
  checkBadges(s);

  const initials = CONFIG.bdr.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
  document.getElementById("bdr-initials").textContent = initials;
  document.getElementById("bdr-name").textContent = CONFIG.bdr;
  document.getElementById("tour-label").textContent = CONFIG.day + " · " + s.total + " comptes";
}

function checkBadges(s) {
  const row = document.getElementById("badges-row");
  BADGES.forEach(b => {
    if (!shownBadges.has(b.id) && b.cond(s)) {
      shownBadges.add(b.id);
      const el = document.createElement("span");
      el.className = "badge";
      el.textContent = b.label;
      row.appendChild(el);
    }
  });
}

function toggleItin(idx) {
  const box = document.getElementById("itin-" + idx);
  const visible = box.style.display === "block";
  box.style.display = visible ? "none" : "block";
}

async function toggleVisite(idx) {
  const r = RECORDS[idx];
  const newVal = !r.fields["Statut visite"];
  r.fields["Statut visite"] = newVal;
  if (!newVal) {
    r.fields["Résultat"] = null;
  }
  renderCard(idx);
  updateHeader();
  showSaving(idx, true);
  try {
    await updateRecord(r.id, { "Statut visite": newVal, "Résultat": r.fields["Résultat"] || null });
  } catch (e) {
    alert("Erreur de sauvegarde : " + e.message);
  }
  showSaving(idx, false);
}

async function setResult(idx, key) {
  const r = RECORDS[idx];
  r.fields["Résultat"] = r.fields["Résultat"] === key ? null : key;
  renderCard(idx);
  updateHeader();
  showSaving(idx, true);
  try {
    await updateRecord(r.id, { "Résultat": r.fields["Résultat"] });
  } catch (e) {
    alert("Erreur de sauvegarde : " + e.message);
  }
  showSaving(idx, false);
}

let noteTimers = {};
function onNoteInput(idx, val) {
  RECORDS[idx].fields["Note terrain"] = val;
  clearTimeout(noteTimers[idx]);
  noteTimers[idx] = setTimeout(async () => {
    showSaving(idx, true);
    try {
      await updateRecord(RECORDS[idx].id, { "Note terrain": val });
    } catch (e) {}
    showSaving(idx, false);
  }, 800);
}

function showSaving(idx, show) {
  const el = document.getElementById("saving-" + idx);
  if (el) el.classList.toggle("show", show);
}

function renderCard(idx) {
  const r = RECORDS[idx];
  const f = r.fields;
  const card = document.getElementById("card-" + idx);
  const activeOpt = RESULT_OPTIONS.find(o => o.key === f["Résultat"]);
  card.className = "account-card" + (activeOpt ? " " + activeOpt.cardCls : (f["Statut visite"] ? " done" : ""));

  const resultBtns = RESULT_OPTIONS.map(o => `
    <button class="result-btn ${f["Résultat"] === o.key ? o.cls : ''}" onclick="setResult(${idx}, '${o.key}')">${o.label}</button>
  `).join("");

  card.innerHTML = `
    <div class="card-top">
      <div class="num-badge">${getNumField(f) || idx + 1}</div>
      <div class="card-info">
        <div class="card-name">${f["Entreprise"] || ""}</div>
        <div class="card-addr">${f["Adresse"] || ""}</div>
        <div class="card-pills">
          <span class="pill ${f["ICP"] === "ICP 1" ? "pill-icp1" : "pill-icp2"}">${f["ICP"] || ""}</span>
          <span class="pill-type">${f["Type"] || ""}</span>
        </div>
        ${f["Lien Google Maps"] ? `<a class="maps-link" href="${f["Lien Google Maps"]}" target="_blank">📍 Ouvrir dans Maps</a>` : ""}
        <br>
        <button class="itin-toggle" onclick="toggleItin(${idx})">🚶 Itinéraire</button>
        <div class="itin-box" id="itin-${idx}">${f["Itinéraire depuis précédent"] || "Pas d'info"}</div>
      </div>
    </div>
    <div class="visite-row">
      <div class="visite-checkbox ${f["Statut visite"] ? "checked" : ""}" onclick="toggleVisite(${idx})">${f["Statut visite"] ? "✓" : ""}</div>
      <div class="visite-label" onclick="toggleVisite(${idx})">Visité</div>
    </div>
    <div class="result-options" style="display:${f["Statut visite"] ? "flex" : "none"}">${resultBtns}</div>
    <textarea class="note-input" rows="2" placeholder="Note rapide…" oninput="onNoteInput(${idx}, this.value)">${f["Note terrain"] || ""}</textarea>
    <div class="saving-indicator" id="saving-${idx}">💾 Sauvegardé</div>
  `;
}

function exportCSV() {
  const BOM = "\uFEFF";
  const headers = ["Numero", "Entreprise", "Adresse", "Type", "ICP", "Statut_visite", "Resultat", "Note_terrain", "Points", "BDR", "Journee"];
  const rows = RECORDS.map((r, i) => {
    const f = r.fields;
    const activeOpt = RESULT_OPTIONS.find(o => o.key === f["Résultat"]);
    let pts = 0;
    if (activeOpt) {
      pts = activeOpt.pts;
      if (f["ICP"] === "ICP 1" && f["Résultat"] !== "Absent") pts = Math.round(pts * 1.3);
    }
    return [
      getNumField(f) != null ? getNumField(f) : (i + 1),
      f["Entreprise"] || "",
      f["Adresse"] || "",
      f["Type"] || "",
      f["ICP"] || "",
      f["Statut visite"] ? "Oui" : "Non",
      f["Résultat"] || "",
      f["Note terrain"] || "",
      pts,
      CONFIG.bdr || "",
      CONFIG.day || ""
    ];
  });
  const csv = BOM + [headers, ...rows]
    .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(";"))
    .join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const safeBdr = (CONFIG.bdr || "pelerin").split(" ")[0];
  a.href = url;
  a.download = `prospection_${safeBdr}_${CONFIG.day}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function renderAll() {
  const container = document.getElementById("accounts-container");
  container.innerHTML = "";
  if (RECORDS.length === 0) {
    container.innerHTML = `<div class="loading-msg">Aucun compte trouvé pour ${CONFIG.bdr} — ${CONFIG.day}.<br>Vérifie le nom exact dans Airtable.</div>`;
    return;
  }
  RECORDS.forEach((_, i) => {
    const div = document.createElement("div");
    div.id = "card-" + i;
    container.appendChild(div);
    renderCard(i);
  });
  updateHeader();
}

window.onload = async () => {
  const cfg = loadStoredConfig();
  if (cfg && cfg.token && cfg.base && cfg.table) {
    CONFIG = cfg;
    try {
      await fetchRecords();
      document.getElementById("config-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("nav-bdr").value = cfg.bdr;
      document.getElementById("nav-day").value = cfg.day;
      renderAll();
    } catch (e) {
      // Si la reconnexion auto échoue (token expiré, etc.), on reste sur l'écran de connexion
      document.getElementById("config-error").textContent = "Reconnexion automatique échouée : " + e.message;
      document.getElementById("config-error").style.display = "block";
    }
  }
};
